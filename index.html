<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acción Fútbol · Reporte de Asistencia</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0e;--panel:#161619;--panel2:#1f1f24;--line:#2a2a30;--pink:#ff2e93;--pink-deep:#c70f6e;--ink:#f5f5f7;--muted:#9a9aa3;--muted2:#5c5c66;--ok:#27c281;--warn:#ffb020;--blue:#64c8ff;--red:#ff4d5e;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:24px 16px 60px}
h1{font-family:'Oswald';font-weight:700;text-transform:uppercase;font-size:26px;margin-bottom:4px}
h1 em{color:var(--pink);font-style:normal}
.sub{color:var(--muted);font-size:13px;margin-bottom:20px}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;font-weight:600}
input,select{width:100%;background:var(--panel);border:1.5px solid var(--line);border-radius:12px;color:var(--ink);font-size:15px;padding:13px 14px;outline:none}
input:focus,select:focus{border-color:var(--pink)}
.field{margin-bottom:14px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--pink);color:#fff;font-family:'Oswald';font-weight:700;font-size:15px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.btn:hover{filter:brightness(1.1)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px}
.hidden{display:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.backhome{position:fixed;top:14px;left:14px;background:var(--pink);border:none;border-radius:8px;padding:7px 13px;font-size:11px;font-family:'Oswald';font-weight:600;text-transform:uppercase;color:#fff;cursor:pointer;z-index:50;text-decoration:none}
.logout{position:fixed;top:14px;right:14px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--muted);cursor:pointer;z-index:50}
.err{background:rgba(255,77,94,.1);border:1px solid rgba(255,77,94,.3);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--red);margin-top:10px;display:none}
.repcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px}
.rt{font-family:'Oswald';font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:.03em}
.rmeta{color:var(--muted);font-size:12px;margin-bottom:16px}
.chart-box{position:relative;height:230px;margin:8px 0 6px}
.legend{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.lg{display:flex;align-items:center;gap:8px;font-size:13px}
.lg .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.lg b{font-family:'Oswald';margin-left:auto}
.alerta{background:rgba(255,77,94,.08);border:1px solid rgba(255,77,94,.3);border-radius:12px;padding:14px 16px;margin-top:16px}
.alerta .at{color:var(--red);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.alerta ul{list-style:none;margin:0;padding:0}
.alerta li{padding:7px 0;border-bottom:1px solid rgba(255,77,94,.15);font-size:14px;display:flex;justify-content:space-between;gap:10px}
.alerta li:last-child{border-bottom:0}
.alerta li .fx{color:var(--red);font-family:'Oswald';font-weight:700;flex-shrink:0}
.loader{text-align:center;color:var(--muted);padding:30px;font-size:14px}
.okmsg{color:var(--ok);text-align:center;padding:16px;font-size:14px}
</style>
</head>
<body>
<a class="backhome" href="/">&#8592; Inicio</a>

<div id="login" class="wrap">
  <div style="height:40px"></div>
  <h1>Reporte de <em>Asistencia</em></h1>
  <p class="sub">Acción Fútbol · Portal del Entrenador</p>
  <div class="card">
    <div class="field"><label>Correo</label><input type="email" id="email" autocomplete="username"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="pass" autocomplete="current-password"></div>
    <button class="btn" id="btn-login">Ingresar</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<div id="app" class="wrap hidden">
  <div class="logout" id="btn-logout">Salir</div>
  <h1>Reporte de <em>Asistencia</em></h1>
  <p class="sub">Selecciona sede, categoría y semana.</p>
  <div class="card">
    <div class="field">
      <label>Sede y categoría</label>
      <select id="sedecat"><option value="">Cargando...</option></select>
    </div>
    <div class="row2">
      <div><label>Desde</label><input type="date" id="desde"></div>
      <div><label>Hasta</label><input type="date" id="hasta"></div>
    </div>
    <div style="height:12px"></div>
    <button class="btn" id="btn-generar">Generar reporte</button>
    <div class="err" id="app-err"></div>
  </div>
  <div id="result"></div>
  <button class="btn btn-ghost hidden" id="btn-pdf" style="margin-top:8px">Descargar PDF</button>
</div>

<script>
const API_ASIS = 'https://script.google.com/macros/s/AKfycbwa53UNt6Q1MmxCt9g8EGB63Hu_r-UqzUQ1Uh51YWfe5ZuZCFTSVenPFLUGOVnghbIt/exec';
const firebaseConfig = {
  apiKey: "AIzaSyDZZsCyfgVTBOswlFPrbdf_pr7uzmQgnTs",
  authDomain: "asistencia-accion-futbol.firebaseapp.com",
  projectId: "asistencia-accion-futbol",
  storageBucket: "asistencia-accion-futbol.firebasestorage.app",
  messagingSenderId: "1007230869241",
  appId: "1:1007230869241:web:d11ce0c37a820325cecc28"
};
firebase.initializeApp(firebaseConfig);
const fbAuth = firebase.auth();
const $ = id => document.getElementById(id);
let CAT = null, CHART = null;

function showErr(id,m){ $(id).textContent=m; $(id).style.display='block'; }
function hideErr(id){ $(id).style.display='none'; }
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function semanaPasada(){
  const h=new Date(), dow=h.getDay();
  const lunEsta=new Date(h); lunEsta.setDate(h.getDate()-((dow+6)%7));
  const lunPas=new Date(lunEsta); lunPas.setDate(lunEsta.getDate()-7);
  const domPas=new Date(lunPas); domPas.setDate(lunPas.getDate()+6);
  return {desde:fmt(lunPas), hasta:fmt(domPas)};
}
async function token(){ const u=fbAuth.currentUser; if(!u) throw new Error('sin sesion'); return await u.getIdToken(); }

$('btn-login').onclick=async()=>{
  hideErr('login-err');
  const email=$('email').value.trim(), pass=$('pass').value;
  if(!email||!pass){ showErr('login-err','Ingresa correo y contrasena.'); return; }
  $('btn-login').disabled=true;
  try{ await fbAuth.signInWithEmailAndPassword(email,pass); }
  catch(e){ showErr('login-err','Correo o contrasena incorrectos.'); }
  $('btn-login').disabled=false;
};
$('btn-logout').onclick=()=>fbAuth.signOut();

fbAuth.onAuthStateChanged(async u=>{
  if(u){
    $('login').classList.add('hidden'); $('app').classList.remove('hidden');
    const s=semanaPasada(); $('desde').value=s.desde; $('hasta').value=s.hasta;
    await cargarConfig();
  } else { $('app').classList.add('hidden'); $('login').classList.remove('hidden'); }
});

async function cargarConfig(){
  try{
    const t=await token();
    const res=await fetch(API_ASIS+'?action=config&idToken='+encodeURIComponent(t),{cache:'no-store'});
    const data=await res.json();
    if(data.error){ showErr('app-err',data.error); return; }
    const bySede={};
    (data.sedes||[]).forEach(x=>{ (bySede[x.sede]=bySede[x.sede]||[]).push(x.categoria); });
    let html='<option value="">Selecciona...</option>';
    Object.keys(bySede).forEach(sede=>{
      html+='<optgroup label="'+sede+'">';
      bySede[sede].forEach(cat=>{ html+='<option value="'+sede+'||'+cat+'">'+sede+' - '+cat+'</option>'; });
      html+='</optgroup>';
    });
    $('sedecat').innerHTML=html;
  }catch(e){ showErr('app-err','No se pudo cargar la configuracion.'); }
}

$('btn-generar').onclick=async()=>{
  hideErr('app-err');
  const val=$('sedecat').value, desde=$('desde').value, hasta=$('hasta').value;
  if(!val){ showErr('app-err','Elige sede y categoria.'); return; }
  if(!desde||!hasta){ showErr('app-err','Elige el rango de fechas.'); return; }
  const parts=val.split('||'), sede=parts[0], cat=parts[1];
  $('result').innerHTML='<div class="loader">Calculando...</div>'; $('btn-pdf').classList.add('hidden');
  try{
    const t=await token();
    const q='?action=reporte&sede='+encodeURIComponent(sede)+'&cat='+encodeURIComponent(cat)+'&desde='+encodeURIComponent(desde)+'&hasta='+encodeURIComponent(hasta)+'&idToken='+encodeURIComponent(t);
    const res=await fetch(API_ASIS+q,{cache:'no-store'});
    const data=await res.json();
    if(data.error){ showErr('app-err',data.error); $('result').innerHTML=''; return; }
    const c=(data.categorias||[])[0];
    if(!c){ $('result').innerHTML='<div class="loader">No hay datos para esa selección.</div>'; return; }
    CAT={rep:data, c:c, sede:sede, cat:cat};
    render(c, data);
    $('btn-pdf').classList.remove('hidden');
  }catch(e){ showErr('app-err','No se pudo generar el reporte.'); $('result').innerHTML=''; }
};

function pct(n,total){ return total? Math.round(n/total*100) : 0; }

function render(c, rep){
  if(c.error){ $('result').innerHTML='<div class="repcard"><div class="rt">'+esc(c.sede)+' · '+esc(c.categoria)+'</div><div class="okmsg">'+esc(c.error)+'</div></div>'; return; }
  const total=c.OK+c.F+c.J+c.L;
  let h='<div class="repcard">';
  h+='<div class="rt">'+esc(c.sede)+' · '+esc(c.categoria)+'</div>';
  h+='<div class="rmeta">Semana '+rep.desde+' a '+rep.hasta+' · '+c.entrenamientos+' entrenamientos</div>';
  h+='<div class="chart-box"><canvas id="chart"></canvas></div>';
  h+='<div class="legend">'+
     lg('var(--ok)','Asistió (OK)',c.OK,pct(c.OK,total))+
     lg('var(--red)','Faltó (F)',c.F,pct(c.F,total))+
     lg('var(--warn)','Justificado (J)',c.J,pct(c.J,total))+
     lg('var(--blue)','Lesionado (L)',c.L,pct(c.L,total))+
     '</div>';
  if(c.alertas&&c.alertas.length){
    h+='<div class="alerta"><div class="at">⚠ Faltaron más de 2 veces</div><ul>';
    h+=c.alertas.map(a=>'<li><span>'+esc(a.nombre)+'</span><span class="fx">'+a.faltas+' faltas</span></li>').join('');
    h+='</ul></div>';
  } else {
    h+='<div class="okmsg">Sin alertas: nadie faltó más de 2 veces.</div>';
  }
  h+='</div>';
  $('result').innerHTML=h;
  drawChart(c);
}
function lg(color,label,val,p){
  return '<div class="lg"><span class="dot" style="background:'+color+'"></span>'+label+' <b>'+p+'% ('+val+')</b></div>';
}
function drawChart(c){
  if(CHART){ CHART.destroy(); CHART=null; }
  const ctx=document.getElementById('chart');
  CHART=new Chart(ctx,{
    type:'doughnut',
    data:{labels:['Asistió','Faltó','Justificado','Lesionado'],
      datasets:[{data:[c.OK,c.F,c.J,c.L],backgroundColor:['#27c281','#ff4d5e','#ffb020','#64c8ff'],borderColor:'#0c0c0e',borderWidth:3}]},
    options:{cutout:'62%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(x){const t=x.dataset.data.reduce((a,b)=>a+b,0);return x.label+': '+x.raw+' ('+(t?Math.round(x.raw/t*100):0)+'%)';}}}}}
  });
}

$('btn-pdf').onclick=()=>{
  if(!CAT) return;
  const c=CAT.c, rep=CAT.rep; const total=c.OK+c.F+c.J+c.L;
  const {jsPDF}=window.jspdf; const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,M=15; let y=20; const PINK=[199,15,110];
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(...PINK);
  doc.text('Reporte de Asistencia — Acción Fútbol',M,y); y+=7;
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(20);
  doc.text(c.sede+' · '+c.categoria,M,y); y+=6;
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(90);
  doc.text('Semana: '+rep.desde+' a '+rep.hasta+'   ('+c.entrenamientos+' entrenamientos)',M,y); y+=8;
  try{ if(CHART){ const img=CHART.toBase64Image(); doc.addImage(img,'PNG',M,y,60,60); } }catch(e){}
  let ty=y+6;
  doc.setFontSize(11); doc.setTextColor(20);
  [['Asistió (OK)',c.OK],['Faltó (F)',c.F],['Justificado (J)',c.J],['Lesionado (L)',c.L]].forEach(r=>{
    doc.text(r[0]+': '+r[1]+'  ('+pct(r[1],total)+'%)',M+68,ty); ty+=8;
  });
  y=Math.max(y+64,ty)+4;
  doc.setDrawColor(220); doc.line(M,y,W-M,y); y+=8;
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(200,40,60);
  doc.text('Faltaron más de 2 veces:',M,y); y+=6;
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(40);
  if(c.alertas&&c.alertas.length){
    c.alertas.forEach(a=>{ if(y>280){doc.addPage();y=20;} doc.text('•  '+a.nombre+' — '+a.faltas+' faltas',M,y); y+=6; });
  } else { doc.setTextColor(39,160,106); doc.text('Sin alertas.',M,y); }
  doc.save('reporte-'+CAT.sede+'-'+CAT.cat+'-'+rep.desde+'.pdf');
};

function esc(s){ return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
</script>
</body>
</html>
